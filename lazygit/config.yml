statusPanelView: allBranchesLog
notARepository: skip

os:
  editPreset: 'vim'
  open: "code {{.SelectedPath}}"
  openDirInEditor: "code {{.SelectedPath}}"
gui:
  nerdFontsVersion: "3"
git:
  branchLogCmd: 'git log --graph --color=always --abbrev-commit --decorate --date=relative --pretty=medium --oneline {{branchName}} --'
  pagers:
    - pager: diff-so-fancy
    - pager: delta --dark --paging=never
  allBranchesLogCmds:
    - git log --all --graph --color=always --abbrev-commit --decorate --date=relative --pretty=medium --oneline
customCommands:
  - key: "<c-a>"
    description: "AI-powered conventional commit (multiline)"
    context: "global"
    loadingText: "Generating commit messages..."
    prompts:
      - type: "menu"
        key: "Type"
        title: "Type of change"
        options:
          - name: "feat"
            description: "A new feature"
            value: "feat"
          - name: "fix"
            description: "A bug fix"
            value: "fix"
          - name: "chore"
            description: "Maintenance / tooling / non-user-facing"
            value: "chore"
          - name: "docs"
            description: "Documentation only"
            value: "docs"
          - name: "style"
            description: "Formatting / linting / no behavior change"
            value: "style"
          - name: "refactor"
            description: "Refactor without behavior change"
            value: "refactor"
          - name: "perf"
            description: "Performance improvement"
            value: "perf"
          - name: "test"
            description: "Add or update tests"
            value: "test"
          - name: "ci"
            description: "CI configuration / scripts"
            value: "ci"
          - name: "build"
            description: "Build system / dependencies"
            value: "build"
      - type: "menuFromCommand"
        title: "AI Generated Commit Messages"
        key: "CommitFile"
        command: "lgaicm suggest --type {{.Form.Type}}"
        filter: '^(?P<label>.*?) <===> (?P<file>.*)$'
        valueFormat: '{{.file}}'
        labelFormat: '{{.label}}'
    command: "lgaicm commit --file {{.Form.CommitFile | quote}}"
  - key: "o"
    description: "Open project in Visual Studio Code"
    context: "status"
    command: "code {{.SelectedPath}}"
    loadingText: "Opening repository in Visual Studio Code"
  - key: "<c-o>"
    description: "Open project in Visual Studio Code"
    context: "global"
    command: "code {{.SelectedPath}}"
services:
  github.boschdevcloud.com: 'github:github.boschdevcloud.com'
